services:
  # ─────────────────────────────────────────────────
  # BACKEND  (FastAPI / Python web service)
  # ─────────────────────────────────────────────────
  - type: web
    name: maintenance-wizard-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./maintenance_wizard.db
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      # ⚠ Set GROQ_API_KEY in the Render dashboard — do NOT hard-code secrets here
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # ─────────────────────────────────────────────────
  # FRONTEND  (React / Vite static site)
  # ─────────────────────────────────────────────────
  - type: web
    name: maintenance-wizard-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # ⚠ After the backend deploys, set VITE_API_URL to your backend's Render URL
      # e.g. https://maintenance-wizard-backend.onrender.com
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
