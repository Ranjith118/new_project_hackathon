<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Maintenance Wizard</title>
    <script>
      // Store the current path and redirect to index with it as a query param
      var path = window.location.pathname + window.location.search;
      sessionStorage.setItem('redirect', path);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
